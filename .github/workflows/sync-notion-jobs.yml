name: Sync Notion Job Tracker → /jobs/data.json

# Runs hourly + on manual trigger. Pulls the Notion DB via API,
# writes /jobs/data.json, commits + pushes so GitHub Pages picks it
# up on the next build (~1-2 min).

on:
  schedule:
    - cron: "0 * * * *" # top of every hour (UTC)
  workflow_dispatch: {} # manual trigger from Actions tab
  push:
    paths:
      - "scripts/fetch-notion-jobs.js"
      - ".github/workflows/sync-notion-jobs.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Notion → data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/fetch-notion-jobs.js

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync Notion job tracker → data.json [skip ci]"
            git push
          fi
